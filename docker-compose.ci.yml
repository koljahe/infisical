services:
  backend:
    container_name: infisical-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    build:
      context: .
      dockerfile: Dockerfile.standalone-infisical
    ports:
      - 8080:8080
    environment:
      - NODE_ENV=production
      - ENCRYPTION_KEY=f13dbc92aaaf86fa7cb0ed8ac3265f47
      - AUTH_SECRET=5lrMXKKWCVocS/uerPsl7V+TX/aaUaI7iDkgl3tSmLE=
      - DB_CONNECTION_URI=postgres://infisical:infisical@db:5432/infisical?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - SITE_URL=http://localhost:8080
      - SMTP_HOST=smtp
      - SMTP_PORT=1025
      - SMTP_FROM_ADDRESS=dev@infisical.local
      - SMTP_FROM_NAME=Infisical
      - TELEMETRY_ENABLED=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/status"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: infisical-redis
    restart: always
    environment:
      - ALLOW_EMPTY_PASSWORD=yes

  db:
    image: postgres:14-alpine
    container_name: infisical-db
    restart: always
    environment:
      POSTGRES_PASSWORD: infisical
      POSTGRES_USER: infisical
      POSTGRES_DB: infisical
    healthcheck:
      test: "pg_isready --username=infisical"
      interval: 3s
      timeout: 5s
      retries: 10
